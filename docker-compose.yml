# Uso local únicamente. En Coolify, Postgres y MinIO son recursos separados
# (ver docs/DEPLOY.md) — este compose NO se usa en producción.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arandusoft
      POSTGRES_PASSWORD: arandusoft
      POSTGRES_DB: arandusoft
    ports:
      - "5432:5432"
    volumes:
      - arandusoft_db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: arandusoft
      MINIO_ROOT_PASSWORD: arandusoft123
    ports:
      - "9000:9000" # API
      - "9001:9001" # consola web
    volumes:
      - arandusoft_minio_data:/data

volumes:
  arandusoft_db_data:
  arandusoft_minio_data:
